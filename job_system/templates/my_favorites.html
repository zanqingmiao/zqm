{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4">我的收藏</h2>
<div class="row">
    {% for job in jobs %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm">
            <div class="card-body">
                <h5 class="card-title text-primary">{{ job.title }}</h5>
                <p class="card-text text-muted">{{ job.company }}</p>
                <p class="card-text">
                    <span class="badge bg-secondary">{{ job.city }}</span>
                    <span class="badge bg-info">{{ job.salary }}</span>
                </p>
                <a href="{{ url_for('job_detail', job_id=job.id) }}" class="btn btn-outline-primary btn-sm stretched-link">查看详情</a>
            </div>
            <div class="card-footer bg-transparent border-top-0">
                <small class="text-muted">收藏时间: {{ job.created_at }}</small>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12">
        <div class="alert alert-info" role="alert">
            暂无收藏职位。
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
