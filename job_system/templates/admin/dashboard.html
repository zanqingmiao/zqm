{% block scripts %}
<script>
function startCrawl() {
    var formData = $('#crawlForm').serialize();
    $.post("{{ url_for('start_crawl') }}", formData, function(data) {
        if (data.success) {
            alert(data.message);
            location.reload();
        } else {
            alert('抓取失败: ' + data.message);
        }
    });
}
</script>
