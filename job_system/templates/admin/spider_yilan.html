{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4">一览应届生网爬虫</h2>

<div class="row">
    <div class="col-md-3">
        <div class="card bg-light mb-3">
            <div class="card-header">功能菜单</div>
            <div class="list-group list-group-flush">
                <a href="{{ url_for('admin_users') }}" class="list-group-item list-group-item-action">用户管理</a>
                <a href="{{ url_for('admin_jobs') }}" class="list-group-item list-group-item-action">职位管理</a>
                <a href="{{ url_for('admin_dashboard') }}" class="list-group-item list-group-item-action">返回仪表盘</a>
            </div>
        </div>
    </div>
    
    <div class="col-md-9">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                启动爬虫
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <strong>提示：</strong> 请输入一览应届生网的搜索结果页URL。例如：<br>
                    <code>http://yjs.job1001.com/job/index.htm?keyword=Python</code>
                </div>
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="url" class="form-label">目标URL</label>
                        <input type="url" class="form-control" id="url" name="url" placeholder="http://yjs.job1001.com/..." required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="start_page" class="form-label">起始页(从0)</label>
                            <input type="number" class="form-control" id="start_page" name="start_page" value="0" min="0">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="end_page" class="form-label">结束页(含)</label>
                            <input type="number" class="form-control" id="end_page" name="end_page" value="2" min="0">
                        </div>
                        <div class="form-text">page 参数从 0 开始，范围为闭区间。</div>
                    </div>
                    
                    <button type="submit" class="btn btn-success" id="start-btn">开始爬取</button>
                </form>
                
                <div id="loading" class="mt-3" style="display: none;">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <span class="ms-2">正在爬取中，请稍候...（可能需要几十秒）</span>
                </div>
                
                <div id="result" class="alert mt-3 d-none" role="alert"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    $('form').on('submit', function(e) {
        e.preventDefault();
        $('#start-btn').prop('disabled', true);
        $('#loading').show();
        $('#result').addClass('d-none').removeClass('alert-success alert-danger').text('');
        $.ajax({
            url: "{{ url_for('spider_yilan') }}",
            method: 'POST',
            data: {
                url: $('#url').val(),
                start_page: $('#start_page').val(),
                end_page: $('#end_page').val()
            },
            headers: {'X-Requested-With': 'XMLHttpRequest'},
            success: function(resp) {
                $('#loading').hide();
                $('#start-btn').prop('disabled', false);
                if (resp.success) {
                    $('#result').removeClass('d-none').addClass('alert alert-success').text(resp.message);
                } else {
                    $('#result').removeClass('d-none').addClass('alert alert-danger').text(resp.message || '抓取失败');
                }
            },
            error: function() {
                $('#loading').hide();
                $('#start-btn').prop('disabled', false);
                $('#result').removeClass('d-none').addClass('alert alert-danger').text('请求失败，请稍后再试');
            }
        });
    });
</script>
{% endblock %}
